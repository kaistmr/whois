<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>충북과학고 공학동아리 DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        /* 스켈레톤 로딩 애니메이션 */
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card:active { transform: scale(0.98); }
        
        /* 태그 스타일 */
        .tag { cursor: pointer; transition: all 0.2s; }
        .tag:hover { background-color: #dbeafe; color: #1e40af; }
        
        /* 플로팅 버튼 애니메이션 */
        .fab { transition: transform 0.2s, box-shadow 0.2s; }
        .fab:hover { transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .fab:active { transform: scale(0.95); }

        /* 알림창(토스트) 애니메이션 */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: rgba(31, 41, 55, 0.95); /* 어두운 회색 */
            color: #fff;
            text-align: center;
            border-radius: 50px; /* 둥글게 */
            padding: 12px 24px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 40px; /* 살짝 위로 떠오르는 효과 */
        }
    </style>
</head>
<body class="max-w-3xl mx-auto min-h-screen pb-24 relative">


    <!-- 로그인 화면 -->
    <div id="login-screen" class="px-5 pt-10 hidden">
        <h2 class="text-2xl font-bold text-gray-900">로그인</h2>
        <p class="text-gray-500 text-sm mt-1">이메일/전화번호로 인증합니다</p>

        <div class="mt-6 space-y-3">
            <input id="login-email" class="w-full border rounded-xl px-4 py-3" placeholder="이메일" />
            <input id="login-phone" class="w-full border rounded-xl px-4 py-3" placeholder="전화번호(숫자만)" />
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white rounded-xl py-3 font-bold">
            로그인
            </button>
            <p id="login-error" class="text-sm text-red-500 hidden"></p>
        </div>
    </div>


    <div id="main-screen" class="hidden">
        <header class="pt-10 pb-6 px-5 bg-white shadow-sm border-b border-gray-100 mb-6">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">📂 충북과학고 공학동아리 DB</h1>
            <p class="text-gray-500 text-sm mt-1">관심사가 맞는 선후배를 찾아보세요</p>
        </header>

        <div class="sticky top-4 z-30 px-4 mb-6">
            <div class="relative shadow-lg rounded-2xl bg-white/95 backdrop-blur-md border border-gray-100">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fas fa-search text-gray-400"></i>
                </div>
                <input type="text" id="search-input" 
                    class="block w-full pl-11 pr-10 py-4 rounded-2xl text-gray-900 placeholder-gray-400 bg-transparent focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-base" 
                    placeholder="이름, 소속, 관심사(예: 보행로봇) 검색...">
                <button id="clear-btn" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 hidden" onclick="clearSearch()">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
        </div>

        <div id="member-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 px-4">
            <div class="card bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-40 flex flex-col justify-between">
                <div class="space-y-3">
                    <div class="flex justify-between">
                        <div class="skeleton h-6 w-24"></div>
                        <div class="skeleton h-5 w-16"></div>
                    </div>
                    <div class="skeleton h-4 w-32"></div>
                </div>
                <div class="skeleton h-8 w-full mt-4"></div>
            </div>
            <div class="card bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-40 hidden md:block"><div class="skeleton w-full h-full"></div></div>
        </div>

        <a id="survey-fab" href="#" target="_blank" 
        class="hidden fixed bottom-6 right-6 bg-blue-600 text-white px-6 py-3.5 rounded-full shadow-xl items-center gap-2 z-50 fab hover:bg-blue-700 transition-all duration-200 group">
            <i class="fas fa-user-edit text-lg group-hover:scale-110 transition-transform"></i>
            <span class="font-bold text-base tracking-tight">정보 등록/수정</span>
        </a>
    </div>

    <script src="config.js"></script>

    <script>
        let allMembers = [];
        let authToken = null;

        function showLogin(msg) {
            document.getElementById("main-screen").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
            if (msg) {
                const el = document.getElementById("login-error");
                el.textContent = msg;
                el.classList.remove("hidden");
            }
        }

        function showMain() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
        }

        async function init() {
            createToastElement();
            setupSurveyButton();



            authToken = localStorage.getItem("authToken");
            if (!authToken) {
                showLogin();
                return;
            }

            // 토큰이 있으면 멤버 데이터 요청
            const ok = await loadMembersFromApi();
            if (!ok) {
                localStorage.removeItem("authToken");
                showLogin("세션이 만료되었거나 인증에 실패했습니다. 다시 로그인해주세요.");
                return;
            }

            showMain();
            renderMembers(allMembers);
        }

        async function handleLogin() {
            const email = document.getElementById("login-email").value.trim();
            const phone = document.getElementById("login-phone").value.trim();

            const body = new URLSearchParams({ email, phone }).toString();

            const res = await fetch(`${API_BASE}?action=login`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
                body
            });

            const data = await res.json();
            if (!data.ok) { showLogin("이메일 또는 전화번호가 일치하지 않습니다."); return; }

            localStorage.setItem("authToken", data.token);
            authToken = data.token;

            const ok = await loadMembersFromApi();
            if (!ok) { showLogin("로그인 후 데이터 로드에 실패했습니다."); return; }

            showMain();
            renderMembers(allMembers);
        }

        async function loadMembersFromApi() {
            try {
                // Apps Script 제약 때문에 token을 query로 보내는 fallback 형태
                const res = await fetch(`${API_BASE}?action=members&token=${encodeURIComponent(authToken)}&t=${Date.now()}`);
                const data = await res.json();

                if (!data.ok) return false;
                allMembers = data.members || [];
                return true;
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        // -----------------------------------------------------------
        // [1] 자동 색상 배정 함수 (이름/소속에 따라 색이 변함)
        // -----------------------------------------------------------
        function getBadgeStyle(text) {
            const styles = [
                'bg-red-50 text-red-600 border-red-100',
                'bg-orange-50 text-orange-600 border-orange-100',
                'bg-amber-50 text-amber-600 border-amber-100',
                'bg-green-50 text-green-600 border-green-100',
                'bg-emerald-50 text-emerald-600 border-emerald-100',
                'bg-teal-50 text-teal-600 border-teal-100',
                'bg-cyan-50 text-cyan-600 border-cyan-100',
                'bg-sky-50 text-sky-600 border-sky-100',
                'bg-blue-50 text-blue-600 border-blue-100',
                'bg-indigo-50 text-indigo-600 border-indigo-100',
                'bg-violet-50 text-violet-600 border-violet-100',
                'bg-purple-50 text-purple-600 border-purple-100',
                'bg-fuchsia-50 text-fuchsia-600 border-fuchsia-100',
                'bg-pink-50 text-pink-600 border-pink-100',
                'bg-rose-50 text-rose-600 border-rose-100'
            ];
            
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = text.charCodeAt(i) + ((hash << 5) - hash);
            }
            return styles[Math.abs(hash) % styles.length];
        }

        function createToastElement() {
            const toastDiv = document.createElement("div");
            toastDiv.id = "toast";
            toastDiv.innerText = "클립보드에 복사되었습니다.";
            document.body.appendChild(toastDiv);
        }

        function copyToClipboard(text, type) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                showToast(`${type}가 복사되었습니다!`);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                showToast(`${type}가 복사되었습니다!`);
            });
        }

        function showToast(message) {
            const x = document.getElementById("toast");
            x.innerText = message;
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2500);
        }

        function setupSurveyButton() {
            const fab = document.getElementById('survey-fab');
            if (typeof SURVEY_URL !== 'undefined' && SURVEY_URL && SURVEY_URL.trim() !== "") {
                fab.href = SURVEY_URL;
                fab.classList.remove('hidden');
                fab.classList.add('flex');
            }
        }

        window.filterByTag = function(tag) {
            const searchInput = document.getElementById("search-input");
            searchInput.value = tag;
            searchInput.dispatchEvent(new Event('input'));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.clearSearch = function() {
            const searchInput = document.getElementById("search-input");
            searchInput.value = '';
            searchInput.dispatchEvent(new Event('input'));
            searchInput.focus();
        }

        function renderMembers(members) {
            const container = document.getElementById("member-list");
            
            if(members.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-400 py-20 flex flex-col items-center"><i class="fas fa-search mb-3 text-2xl"></i>검색 결과가 없습니다.</div>`;
                return;
            }

            container.innerHTML = members.map(m => {
                // [관심사 태그] 처리
                const interestsHtml = m.interests 
                    ? m.interests.split(/[\/,]/).map(t => `<span onclick="filterByTag('${t.trim()}')" class="tag text-xs font-medium px-2.5 py-1 rounded-md bg-slate-100 text-slate-600 mr-1.5 mb-1.5 inline-block border border-slate-200">#${t.trim()}</span>`).join('') 
                    : '';
                
                // [NEW] [직장/학교 태그] 처리 (여러 개 지원 + 컬러풀 + 검색기능)
                const orgHtml = m.org 
                    ? m.org.split(/[\/,]/).map(o => {
                        const orgName = o.trim();
                        if(!orgName) return '';
                        const style = getBadgeStyle(orgName); // 자동 색상 적용
                        return `<span onclick="filterByTag('${orgName}')" class="cursor-pointer text-xs font-bold px-2 py-1 rounded-lg border ${style} ml-1 mb-1 inline-block hover:opacity-80 transition-opacity">${orgName}</span>`
                    }).join('')
                    : '<span class="text-xs text-gray-400">-</span>';

                const cohortDisplay = m.cohort ? m.cohort.replace("기", "") + "기" : "";

                const phoneBtn = m.phone 
                    ? `<button onclick="copyToClipboard('${m.phone}', '전화번호')" class="flex-1 bg-white border border-gray-200 text-gray-700 py-2.5 rounded-xl text-center hover:bg-gray-50 transition font-medium text-sm flex items-center justify-center gap-2 cursor-pointer active:bg-gray-100">
                        <i class="far fa-copy text-green-600"></i> 번호복사
                       </button>` 
                    : '';
                    
                const emailBtn = m.email 
                    ? `<button onclick="copyToClipboard('${m.email}', '이메일')" class="flex-1 bg-white border border-gray-200 text-gray-700 py-2.5 rounded-xl text-center hover:bg-gray-50 transition font-medium text-sm flex items-center justify-center gap-2 cursor-pointer active:bg-gray-100">
                        <i class="far fa-copy text-blue-600"></i> 메일복사
                       </button>` 
                    : '';

                return `
                <div class="card bg-white p-5 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-gray-100 flex flex-col justify-between h-full hover:border-blue-200">
                    <div>
                        <div class="flex flex-col gap-2 mb-3">
                            <div class="flex justify-between items-start">
                                <h3 class="text-xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                                    ${m.name}
                                    <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">${cohortDisplay}</span>
                                </h3>
                                <span class="text-xs text-gray-400 mt-1">${m.role || '부원'}</span>
                            </div>
                            
                            <div class="flex flex-wrap items-center">
                                ${orgHtml}
                            </div>
                        </div>
                        
                        <div class="mb-5 min-h-[24px]">${interestsHtml}</div>
                    </div>
                    <div class="flex gap-2 mt-auto pt-4 border-t border-gray-50">
                        ${phoneBtn} ${emailBtn}
                    </div>
                </div>`;
            }).join("");
        }

        const searchInput = document.getElementById("search-input");
        const clearBtn = document.getElementById("clear-btn");
        searchInput.addEventListener("input", (e) => {
            const term = e.target.value.toLowerCase();
            if(term.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');
            const filtered = allMembers.filter(m => 
                (m.name && m.name.toLowerCase().includes(term)) || 
                (m.org && m.org.toLowerCase().includes(term)) || 
                (m.interests && m.interests.toLowerCase().includes(term)) ||
                (m.cohort && m.cohort.toLowerCase().includes(term))
            );
            renderMembers(filtered);
        });

        init();
    </script>
</body>
</html>
